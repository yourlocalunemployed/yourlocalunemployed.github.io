<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 340" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="340" fill="#1d1e20"/>

  <text x="40" y="42" fill="#e8e8e8" font-size="16" font-weight="600">WireGuard is the tunnel &#183; Tailscale is the management layer</text>

  <!-- Top layer: Tailscale (management) -->
  <rect x="140" y="80" width="660" height="92" rx="10" fill="#2a2224" stroke="#E81A1A" stroke-width="1.6"/>
  <text x="168" y="116" fill="#e8e8e8" font-size="19" font-weight="600">Tailscale</text>
  <text x="168" y="138" fill="#E81A1A" font-size="12.5">the management layer</text>

  <rect x="360" y="98" width="132" height="26" rx="13" fill="#211d1e" stroke="#6e3b3b" stroke-width="1"/>
  <text x="426" y="115" text-anchor="middle" fill="#d9b3b3" font-size="11">key distribution</text>
  <rect x="500" y="98" width="126" height="26" rx="13" fill="#211d1e" stroke="#6e3b3b" stroke-width="1"/>
  <text x="563" y="115" text-anchor="middle" fill="#d9b3b3" font-size="11">NAT traversal</text>
  <rect x="634" y="98" width="118" height="26" rx="13" fill="#211d1e" stroke="#6e3b3b" stroke-width="1"/>
  <text x="693" y="115" text-anchor="middle" fill="#d9b3b3" font-size="11">web console</text>
  <text x="556" y="152" text-anchor="middle" fill="#9aa0a6" font-size="12">distributes keys, punches through NAT, no port-forwarding</text>

  <!-- built on -->
  <line x1="470" y1="172" x2="470" y2="208" stroke="#8a8a8a" stroke-width="2" marker-end="url(#ar)"/>
  <text x="508" y="194" fill="#8a8a8a" font-size="11">built on</text>

  <!-- Bottom layer: WireGuard (tunnel) -->
  <rect x="140" y="210" width="660" height="80" rx="10" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="168" y="244" fill="#e8e8e8" font-size="19" font-weight="600">WireGuard</text>
  <text x="168" y="266" fill="#9aa0a6" font-size="12.5">the tunnel &#183; same protocol &#183; same end-to-end encryption</text>

  <text x="470" y="322" text-anchor="middle" fill="#8a8a8a" font-size="12.5" font-style="italic">Merging the two VPNs was choosing a control plane, not a protocol.</text>
</svg>
