<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="430" fill="#1d1e20"/>

  <!-- ===================== BEFORE ===================== -->
  <text x="40" y="38" fill="#9aa0a6" font-size="15" letter-spacing="1.5" font-weight="600">BEFORE — GitHub Pages</text>

  <rect x="40" y="54" width="180" height="62" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">GitHub repo</text>
  <text x="130" y="101" text-anchor="middle" fill="#9aa0a6" font-size="11.5">source of truth</text>

  <text x="262" y="79" text-anchor="middle" fill="#9aa0a6" font-size="11">git push</text>
  <line x1="222" y1="85" x2="298" y2="85" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="302" y="54" width="248" height="62" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="426" y="82" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">GitHub Actions</text>
  <text x="426" y="101" text-anchor="middle" fill="#9aa0a6" font-size="11.5">hugo.yml &#8594; build</text>

  <line x1="552" y1="85" x2="648" y2="85" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="652" y="54" width="246" height="62" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="775" y="82" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">yourlocalunemployed</text>
  <text x="775" y="101" text-anchor="middle" fill="#9aa0a6" font-size="11.5">.github.io</text>

  <text x="775" y="138" text-anchor="middle" fill="#e06c6c" font-size="12.5">&#10007; can't set custom security headers</text>

  <!-- divider -->
  <line x1="40" y1="168" x2="900" y2="168" stroke="#3a3b3e" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- ===================== AFTER ===================== -->
  <text x="40" y="203" fill="#E81A1A" font-size="15" letter-spacing="1.5" font-weight="600">AFTER — Cloudflare Pages</text>

  <rect x="40" y="219" width="180" height="62" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="130" y="247" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">GitHub repo</text>
  <text x="130" y="266" text-anchor="middle" fill="#9aa0a6" font-size="11.5">source of truth</text>

  <text x="262" y="244" text-anchor="middle" fill="#9aa0a6" font-size="11">git push</text>
  <line x1="222" y1="250" x2="298" y2="250" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="302" y="219" width="248" height="62" rx="8" fill="#2a2224" stroke="#E81A1A" stroke-width="1.6"/>
  <text x="426" y="247" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">Cloudflare Pages</text>
  <text x="426" y="266" text-anchor="middle" fill="#9aa0a6" font-size="11.5">hugo --gc --minify</text>

  <line x1="552" y1="250" x2="648" y2="250" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="652" y="219" width="246" height="62" rx="8" fill="#2a2224" stroke="#E81A1A" stroke-width="1.6"/>
  <text x="775" y="247" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">billalrehmani</text>
  <text x="775" y="266" text-anchor="middle" fill="#9aa0a6" font-size="11.5">.pages.dev</text>

  <text x="470" y="320" text-anchor="middle" fill="#3fb950" font-size="12.5">&#43; _headers: CSP &#183; HSTS &#183; nosniff &#183; frame-ancestors &#183; Referrer/Permissions-Policy</text>
  <text x="470" y="342" text-anchor="middle" fill="#3fb950" font-size="12.5">&#43; Cloudflare edge: automatic TLS &#183; DDoS mitigation &#183; global CDN</text>

  <text x="470" y="393" text-anchor="middle" fill="#8a8a8a" font-size="12.5" font-style="italic">Same git push — different builder. Now with real HTTP security headers.</text>
</svg>
