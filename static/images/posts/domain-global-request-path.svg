<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="300" fill="#1d1e20"/>

  <text x="40" y="40" fill="#9aa0a6" font-size="15" letter-spacing="1.2" font-weight="600">ONE REQUEST TO billsblog.dev &#8212; FROM ANYWHERE</text>

  <rect x="30" y="78" width="180" height="88" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="120" y="116" text-anchor="middle" fill="#e8e8e8" font-size="14.5" font-weight="600">Visitor</text>
  <text x="120" y="137" text-anchor="middle" fill="#9aa0a6" font-size="11.5">any country,</text>
  <text x="120" y="152" text-anchor="middle" fill="#9aa0a6" font-size="11.5">any device</text>

  <line x1="212" y1="122" x2="266" y2="122" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="270" y="78" width="188" height="88" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="364" y="110" text-anchor="middle" fill="#e8e8e8" font-size="14.5" font-weight="600">DNS lookup</text>
  <text x="364" y="131" text-anchor="middle" fill="#9aa0a6" font-size="11.5">Cloudflare DNS</text>
  <text x="364" y="147" text-anchor="middle" fill="#9aa0a6" font-size="11.5">&#43; DNSSEC signed</text>

  <line x1="460" y1="122" x2="514" y2="122" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="518" y="78" width="200" height="88" rx="8" fill="#2a2224" stroke="#E81A1A" stroke-width="1.6"/>
  <text x="618" y="104" text-anchor="middle" fill="#e8e8e8" font-size="14.5" font-weight="600">Nearest CF edge</text>
  <text x="618" y="124" text-anchor="middle" fill="#9aa0a6" font-size="11">TLS 1.3 &#183; CDN cache</text>
  <text x="618" y="140" text-anchor="middle" fill="#9aa0a6" font-size="11">CSP &#183; HSTS headers</text>
  <text x="618" y="156" text-anchor="middle" fill="#9aa0a6" font-size="11">1 of 300&#43; locations</text>

  <line x1="720" y1="122" x2="774" y2="122" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="778" y="78" width="150" height="88" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="853" y="110" text-anchor="middle" fill="#e8e8e8" font-size="14.5" font-weight="600">Static files</text>
  <text x="853" y="131" text-anchor="middle" fill="#9aa0a6" font-size="11.5">Hugo build,</text>
  <text x="853" y="147" text-anchor="middle" fill="#9aa0a6" font-size="11.5">cached at edge</text>

  <text x="40" y="214" fill="#3fb950" font-size="12.5">The visitor never reaches an origin server &#8212; there isn't one to attack. They hit the closest edge,</text>
  <text x="40" y="234" fill="#3fb950" font-size="12.5">which serves pre-built HTML over TLS with the security headers already baked in.</text>

  <text x="40" y="274" fill="#8a8a8a" font-size="12" font-style="italic">Anycast routing means &#8220;the server&#8221; is wherever the reader happens to be.</text>
</svg>
