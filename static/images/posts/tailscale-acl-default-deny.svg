<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="400" fill="#1d1e20"/>

  <text x="40" y="42" fill="#e8e8e8" font-size="16" font-weight="600">Access rules — default-deny into the lab</text>

  <!-- devices -->
  <rect x="40" y="92" width="180" height="72" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="130" y="123" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">My devices</text>
  <text x="130" y="143" text-anchor="middle" fill="#9aa0a6" font-size="11.5">autogroup:member</text>

  <line x1="220" y1="128" x2="300" y2="128" stroke="#8a8a8a" stroke-width="2" marker-end="url(#ar)"/>

  <!-- gate -->
  <rect x="304" y="100" width="150" height="56" rx="8" fill="#2a2224" stroke="#E81A1A" stroke-width="1.6"/>
  <text x="379" y="124" text-anchor="middle" fill="#e8e8e8" font-size="13.5" font-weight="600">Tailscale ACL</text>
  <text x="379" y="142" text-anchor="middle" fill="#E81A1A" font-size="11">default-deny</text>

  <line x1="454" y1="128" x2="534" y2="128" stroke="#8a8a8a" stroke-width="2" marker-end="url(#ar)"/>

  <!-- lab -->
  <rect x="538" y="92" width="180" height="72" rx="8" fill="#26272a" stroke="#3a3b3e" stroke-width="1.5"/>
  <text x="628" y="123" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">Lab network</text>
  <text x="628" y="143" text-anchor="middle" fill="#9aa0a6" font-size="11.5">10.10.0.0/24</text>

  <!-- ALLOWED panel -->
  <rect x="40" y="210" width="420" height="150" rx="10" fill="#1f2420" stroke="#2f5a3a" stroke-width="1.4"/>
  <text x="62" y="240" fill="#3fb950" font-size="13" font-weight="600" letter-spacing="1">ALLOWED</text>
  <text x="62" y="270" fill="#cfe8d6" font-size="13">&#10003;&#160; tcp 22 — SSH</text>
  <text x="62" y="298" fill="#cfe8d6" font-size="13">&#10003;&#160; tcp 80 / 443 — web</text>
  <text x="62" y="326" fill="#cfe8d6" font-size="13">&#10003;&#160; tcp/udp 53 — DNS (keeps split-DNS working)</text>

  <!-- BLOCKED panel -->
  <rect x="480" y="210" width="420" height="150" rx="10" fill="#241f21" stroke="#6e3b3b" stroke-width="1.4"/>
  <text x="502" y="240" fill="#e06c6c" font-size="13" font-weight="600" letter-spacing="1">BLOCKED — everything else</text>
  <text x="502" y="270" fill="#e6c9c9" font-size="13">&#10007;&#160; metrics DB — no auth at all</text>
  <text x="502" y="298" fill="#e6c9c9" font-size="13">&#10007;&#160; every other port and service</text>
  <text x="502" y="326" fill="#e6c9c9" font-size="13">&#10007;&#160; anything you deploy and forget</text>

  <text x="470" y="388" text-anchor="middle" fill="#8a8a8a" font-size="12.5" font-style="italic">A second grant lets my own devices reach each other on any port — so SSH between them still works.</text>
</svg>
