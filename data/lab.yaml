# Home-lab component inventory — rendered on /lab/ by layouts/_default/lab.html.
# Every component links to the post where it was built ("each box has a write-up").
# Keep in sync as the lab grows. Network detail here must stay within what the
# posts already publish (10.10.0.0/24, VLANs 10/20/30) — no domains, tailnet
# names, public IPs, or home-LAN specifics.

# Headline figures (kept honest — each is defensible from a published post).
numbers:
  - value: "1"
    label: "inbound port — WireGuard only, all else closed"
  - value: "MFA"
    label: "on every login, enforced centrally"
  - value: "3"
    label: "firewall-isolated VLANs"
  - value: "15"
    label: "components, each with a write-up"
  - value: "4"
    label: "telemetry & egress flows"

# The lab as defence-in-depth layers. Each layer groups its components.
layers:
  - name: "Boundary & network"
    icon: "🛡"
    blurb: "A firewall VM is the only thing the rest of the lab talks to the world through — default-deny, private ranges blocked outbound, segmented into isolated zones."
    components:
      - icon: "🛡"
        name: "pfSense firewall"
        runs: "Dedicated VM · WAN + LAN 10.10.0.0/24"
        secured: "Default-deny rules; MFA admin login"
        post: "/posts/pfsense-lab-recovery-and-hardening/"
      - icon: "🕸"
        name: "VLAN segmentation"
        runs: "VLANs 10 / 20 / 30 — Trusted, IoT, Guest"
        secured: "Inter-VLAN traffic firewalled by default"
        post: "/posts/vlan-segmentation-pfsense/"
      - icon: "🔐"
        name: "WireGuard VPN"
        runs: "On pfSense, reached from mobile data"
        secured: "Key-based, through the nested firewall"
        post: "/posts/wireguard-pfsense-nested-firewall/"

  - name: "Identity & access"
    icon: "🪪"
    blurb: "One identity provider with MFA is the single login authority — for web dashboards and for the firewall's own admin login. Who you are and what you may do are decided in one place."
    components:
      - icon: "🔐"
        name: "Authentik IdP"
        runs: "Docker on the Debian VM"
        secured: "MFA enforced centrally, group-based roles"
        post: "/posts/identity-provider-authentik-grafana-sso/"
      - icon: "🪪"
        name: "pfSense ↔ Authentik LDAP"
        runs: "Firewall auth against the IdP"
        secured: "MFA + group admin on a device with no browser"
        post: "/posts/pfsense-authentik-ldap-radius/"
      - icon: "🔑"
        name: "Vaultwarden"
        runs: "Docker + Caddy, wildcard TLS via DNS-01"
        secured: "Zero inbound ports; reached over WireGuard"
        post: "/posts/self-hosted-vaultwarden-caddy-duckdns/"

  - name: "Compute & automation"
    icon: "🖥"
    blurb: "One hardened Debian VM hosts the containers and the agent workflow. It runs the services above and the monitoring below, and it's locked down as its own audited surface."
    components:
      - icon: "🖥"
        name: "Debian VM"
        runs: "VMware host for Docker + native services"
        secured: "Auto-updates, nftables, Tailscale-only SSH, sandboxing"
        post: "/posts/hardening-debian-homelab-vm/"
      - icon: "🔗"
        name: "MCP hub"
        runs: "Custom server on the VM, over Tailscale"
        secured: "No inbound ports, narrow tool surface"
        post: "/posts/claude-code-mcp-hub-tailscale/"
      - icon: "📝"
        name: "Claude Code pipeline"
        runs: "Drives the blog + lab work from the VM"
        secured: "Deterministic hooks gate posts, builds, commands"
        post: "/posts/self-hosted-hugo-claude-code-pipeline/"

  - name: "Observability & detection"
    icon: "📈"
    blurb: "Metrics answer 'what's the number', logs answer 'what happened', and alerts reach out so nothing waits to be noticed. Dashboards, alerting, and a log SIEM on one stack."
    components:
      - icon: "📈"
        name: "Prometheus"
        runs: "Native systemd, localhost-bound :9090"
        secured: "Scrapes the VM + pfSense, no external exposure"
        post: "/posts/prometheus-grafana-observability-stack/"
      - icon: "📊"
        name: "Grafana"
        runs: "Dashboards over the metric + log stores"
        secured: "SSO via OIDC, admin by group membership"
        post: "/posts/identity-provider-authentik-grafana-sso/"
      - icon: "🔔"
        name: "Alertmanager → ntfy"
        runs: "Docker :9093 → phone push"
        secured: "Metric + log alerts, formatted, loopback-bound"
        post: "/posts/metrics-arent-monitoring/"
      - icon: "🪵"
        name: "Loki SIEM"
        runs: "Loki + Promtail + rsyslog, in Docker"
        secured: "pfSense/auth/syslog centralised, LogQL detection"
        post: "/posts/homelab-siem-loki/"

  - name: "Resilience & edge"
    icon: "💾"
    blurb: "The parts that decide whether the lab survives a bad day: encrypted off-site backups that have actually been restored, and a physical glance display that never crosses the isolation boundary."
    components:
      - icon: "💾"
        name: "Encrypted backups"
        runs: "Bash + cron → age → OneDrive"
        secured: "pg_dump/.backup for consistency, restore-tested"
        post: "/posts/backup-you-havent-restored/"
      - icon: "⏱"
        name: "LaMetric display"
        runs: "Physical desk display, live lab stats"
        secured: "Over MQTT + SNMP outbound — no LAN crossover"
        post: "/posts/implementing-lametric-time-to-network/"
