baseURL = "https://yourlocalunemployed.github.io/"
locale = "en-AU"
title = "Bill's Blog"
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false
  mainSections = ["posts"]
  description = "IT student. Networking, security, Linux, and the occasional shader pack."
  comments = true
  images = ["images/eft-bg.jpg"]

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourlocalunemployed"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/billal-r-308325242/"

  [params.homeInfoParams]
    Title = "About this blog"
    Content = "IT student using Claude AI to build and manage this site. I run Claude on a Debian VM, with pfSense as a firewall VM for added security.\n\nThis blog documents my personal projects — networking, security, Linux, and more. I give Claude the input; it does the rest."

  [params.goatcounter]
    # Privacy-friendly analytics (no cookies). Set to your GoatCounter site
    # code (the "<code>" in <code>.goatcounter.com) to enable. Empty = off.
    code = ""

  [params.giscus]
    repo = "yourlocalunemployed/yourlocalunemployed.github.io"
    repoId = "R_kgDOTIRXSA"
    category = "Announcements"
    categoryId = "DIC_kwDOTIRXSM4DARN8"

[taxonomies]
  tag = "tags"
  series = "series"

[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 2
  [[menu.main]]
    name = "Laptop Claude Proj"
    url = "/laptop-claude-proj/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4
  [[menu.main]]
    name = "Now"
    url = "/now/"
    weight = 5
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 6
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 7
  [[menu.main]]
    name = "Privacy"
    url = "/privacy/"
    weight = 8
